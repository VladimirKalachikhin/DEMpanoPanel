// Дальше определение функций
function doWebsocket(uri){
socket = new WebSocket(uri);
socket.onopen = websocketOnOpen;
socket.onmessage = websocketOnMessage;
socket.onclose = websocketOnClose;
socket.onerror = websocketOnError;
//console.log('[doWebsocket] try to open socket',socket);
} // end function doWebsocket


function websocketOnOpen(event) {
/**/
// формируем подписку
//event.target.send(subscribe);	// подписываемся
event.target.send("\n\n");	// gpsdPROXY не отзовётся, если ему что-нибудь не прислать.
console.log("Winsocket open: Connection establish with "+uri);
}; // end function websocketOnOpen


function websocketOnMessage(event) {
//console.log(event);
// Получаем исходные данные
let indata;
try {
	indata = JSON.parse(event.data);	// но просто строка -- это корректный json, и никаких ошибок не будет, если сервер вернул не json
	if(!indata) throw Error('inbound empty');
	if(typeof indata !== 'object')  throw Error('inbound not a object: '+indata);
}
catch(error) {
	console.log('Parsing inbound data error: ',error.message);
	return;
}
//console.log(`[websocketOnMessage] Данные получены с сервера: `,JSON.stringify(indata,null,"\t"));
// Устанавливаем соединение по протоколу gpsd
switch(indata.class){
case 'VERSION':
	console.log('websocketOnMessage: Handshaiking with gpsd begin: VERSION recieved. Sending WATCH');
	event.target.send(subscribe);	// подписываемся
	return;
	break;
case 'DEVICES':
	console.log('websocketOnMessage: Handshaiking with gpsd proceed: DEVICES recieved');
	return;
	break;
case 'WATCH':
	console.log('websocketOnMessage: Handshaiking with gpsd complit: WATCH recieved.');
	gpsdPROXYbackend = true;	// типа, gpsd2websocket не шлёт watch
	return;
	break;
};
doProcess(indata);	// собственно, содержательная деятельность
}; // end function websocketOnMessage


function websocketOnClose(event) {
/**/
//console.log('[websocketOnClose] event:',event);
if (event.wasClean) {
	console.log(`Websocket closed cleary with code ${event.code} by reason: ${event.reason}`);
} 
else {	// сервер убил процесс или сеть недоступна. Обычно в этом случае event.code 1006
	console.log(`Websocket closed: connection broken with code ${event.code} by reason ${event.reason}`);
	let emuri;
	//console.log('[websocketOnClose] event.target.url=',event.target.url,'uri=',uri);
	if(event.target.url.replace(/^\/+|\/+$/g, '') == uri.replace(/^\/+|\/+$/g, '')) {	// в этом дурацком языке trim без параметров
		if(window.location.hostname) emuri = `ws://${window.location.hostname}:${options.gpsdProxyPort}`;
		else emuri = `ws://localhost:${options.gpsdProxyPort}`;
	}
	else emuri = uri;
	window.setTimeout(doWebsocket, 5000, emuri); 	// перезапустим сокет через 5 секунд
};
if(optionsUpdateProcess) clearInterval(optionsUpdateProcess);	// остановим периодическое сохранение options
optionsUpdateProcess = null;
}; // end function websocketOnClose


function websocketOnError(error) {
/**/
//console.log('[websocketOnError] error:',error);
console.log(`Websocket error: ${error.message}`);
}; // end function websocketOnError


function doProcess(indata){
//console.log(`[doProcess] Данные получены с сервера: `,JSON.stringify(indata,null,"\t"));
switch(indata.class){
case 'TPV':
	if((indata.lat == undefined) || (indata.lon == undefined)) {
		spatialInfoPresent = false;
		bearingMark.hidden = true;	// Выключим кораблик в компасе
		if(!followSwitch.checked) followSwitch.disabled = true;
		if(optionsUpdateProcess) clearInterval(optionsUpdateProcess);	// остановим периодическое сохранение options
		optionsUpdateProcess = null;
		break;
	};
	if(followSwitch.disabled) followSwitch.disabled = false;
	if(!followSwitch.checked) break;	// если не указано следовать координатам - всё.
	const bearing = indata.track + cameraOptions.userDirection;
	cameraOptions.cameraCenter = {"lng":indata.lon,"lat":indata.lat};
	//console.log('bearing=',bearing,'cameraOptions:',JSON.stringify(cameraOptions,null,"\t"));
	cameraOptions = {...cameraOptions, ...map.calculateCameraOptionsFROMcustom(cameraOptions.cameraCenter,bearing,options.cameraHeight,fakeDistance)};
	if(cameraOptions.userPitch !== undefined) cameraOptions.pitch = cameraOptions.userPitch;
	//console.log('[doProcess] cameraOptions:',JSON.stringify(cameraOptions,null,"\t"));

	//map.jumpTo(cameraOptions);
	map.panTo(cameraOptions.cameraCenter,cameraOptions)

	if(!optionsUpdateProcess) {	// если ещё не, запустим периодическое сохранение точки и направления просмотра
		optionsUpdateProcess = window.setInterval(opionsFromCameraOptions,5000);
	};
	viewAngleMark.style.transform = `rotate(${cameraOptions.bearing}deg)`;	// оно по событию тоже повернётся, но когда ещё то событие произойдёт...
	bearingMark.style.transform = `rotate(${indata.track}deg)`;	// повернём значёк на панели
	spatialInfoPresent = true;
	if(bearingMark.hidden == true) bearingMark.hidden = false;	// включим кораблик в компасе. if - для экономии.
	break;
default:
	return;	// чисто на всякий случай
};
}; // end function doProcess
</script>
